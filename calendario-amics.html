<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendari Amics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f3ee;min-height:100vh}
#pg-login{min-height:100vh;background:#1a3a5c;display:flex;align-items:center;justify-content:center}
#pg-app{display:none}
.card{background:#fff;border-radius:16px;padding:40px 36px;width:340px;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.card h2{text-align:center;color:#1a3a5c;font-size:24px;margin-bottom:28px}
.card label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:6px;margin-top:14px}
.card select,.card input{display:block;width:100%;padding:11px 13px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;font-family:Arial;background:#f9f9f9}
.card select:focus,.card input:focus{outline:none;border-color:#4a8ab5;background:#fff}
#btn-login{display:block;width:100%;margin-top:22px;padding:13px;background:#1a3a5c;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;font-family:Arial}
#btn-login:hover{background:#2c5f8a}
#login-err{color:#c0392b;font-size:13px;text-align:center;margin-top:10px;min-height:18px}
.sync-bar{background:#2c5f8a;text-align:center;padding:5px;font-size:12px;color:rgba(255,255,255,.8);display:none}
.sync-bar.vis{display:block}
.topbar{background:#1a3a5c;display:flex;align-items:center;justify-content:space-between;padding:10px 18px;flex-wrap:wrap;gap:8px}
.topbar-u{display:flex;align-items:center;gap:10px;color:#fff;font-size:14px}
.av{width:34px;height:34px;border-radius:50%;background:#c9a84c;color:#1a3a5c;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.topbar-btns{display:flex;gap:8px;align-items:center}
.tbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:7px;padding:7px 13px;font-size:13px;cursor:pointer;font-family:Arial}
.tbtn:hover{background:rgba(255,255,255,.28)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#e74c3c;display:inline-block;margin-right:4px;vertical-align:middle}
.sync-dot.ok{background:#27ae60}
.hdr{position:relative;height:175px;overflow:hidden;background:#1a3a5c}
.hdr img{width:100%;height:100%;object-fit:cover;object-position:center top}
.hdr-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(13,33,55,.2),rgba(13,33,55,.7));display:flex;align-items:flex-end;justify-content:center;padding-bottom:18px}
.hdr-tit{font-size:28px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.cal-wrap{max-width:880px;margin:20px auto;padding:0 12px 60px}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.nav-tit{font-size:22px;font-weight:700;color:#1a3a5c;text-align:center;flex:1}
.nav-btn{background:#fff;border:1.5px solid #ddd;color:#1a3a5c;border-radius:9px;padding:7px 16px;font-size:20px;cursor:pointer}
.nav-btn:hover{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.ley{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:#888;align-items:center}
.ley-i{display:flex;align-items:center;gap:5px}
.ley-d{width:11px;height:11px;border-radius:3px}
.cal-box{background:#fff;border-radius:12px;box-shadow:0 3px 16px rgba(26,58,92,.09);overflow:hidden;border:1px solid #e8e4db}
.cal-sem{display:grid;grid-template-columns:repeat(7,1fr);background:#1a3a5c}
.cal-ds{text-align:center;padding:10px 2px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.65)}
.cal-ds:last-child{color:rgba(231,76,60,.85)}
.cal-dies{display:grid;grid-template-columns:repeat(7,1fr)}
.cel{min-height:78px;padding:6px 5px 4px;border-right:1px solid #e8e4db;border-bottom:1px solid #e8e4db;cursor:pointer;transition:background .12s}
.cel:nth-child(7n){border-right:none}
.cel:hover{background:#eeeae3}
.cel.altre{opacity:.28;pointer-events:none}
.cel.avui{background:#edf4fb;border:1.5px solid #4a8ab5}
.cel.fest .num{color:#c0392b;font-weight:700}
.cel.dg .num{color:#c0392b}
.num{font-size:13px;font-weight:700;display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;border-radius:50%}
.cel.avui .num{background:#1a3a5c;color:#fff}
.fest-nom{font-size:9px;color:#c0392b;font-weight:700;line-height:1.2;margin-top:1px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-list{margin-top:3px;display:flex;flex-direction:column;gap:2px}
.ev-pill{border-radius:4px;padding:2px 4px;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-pill.meu{background:#d4eaf8;color:#1a3a5c}
.ev-pill.u-JR{background:#fadbd8;color:#c0392b;border:1px solid #e74c3c}
.ev-pill.u-Pepe{background:#d6eaf8;color:#1a5276}
.ev-pill.u-Manolo{background:#fef9e7;color:#7d6608;border:1px solid #f0d060}
.overlay{display:none;position:fixed;inset:0;background:rgba(13,33,55,.5);z-index:200;align-items:center;justify-content:center;padding:14px}
.overlay.vis{display:flex}
.modal{background:#fff;border-radius:14px;padding:26px 22px 22px;width:100%;max-width:440px;box-shadow:0 16px 50px rgba(0,0,0,.22);position:relative;max-height:92vh;overflow-y:auto}
.modal h3{font-size:19px;font-weight:700;color:#1a3a5c;margin-bottom:18px}
.modal-x{position:absolute;top:14px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:4px;line-height:1}
.camp{margin-bottom:14px}
.camp label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#888;margin-bottom:5px}
.camp input,.camp textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:Arial;color:#1c1c1c;background:#f9f9f9}
.camp input:focus,.camp textarea:focus{outline:none;border-color:#4a8ab5;background:#fff}
.camp textarea{resize:vertical;min-height:64px}
.camp-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;gap:9px;justify-content:flex-end;margin-top:10px;flex-wrap:wrap}
.btn-cancel{padding:10px 16px;background:none;border:1.5px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;font-family:Arial;color:#888}
.btn-cancel:hover{background:#f5f3ee}
.btn-save{padding:10px 20px;background:#1a3a5c;color:#fff;border:none;border-radius:8px;font-size:14px;font-family:Arial;font-weight:700;cursor:pointer}
.btn-save:hover{background:#2c5f8a}
.btn-del{padding:10px 16px;background:#fdecea;color:#c0392b;border:1.5px solid #f5c6c2;border-radius:8px;font-size:14px;font-family:Arial;cursor:pointer;margin-right:auto}
.btn-del:hover{background:#fbd7d4}
.ev-card{padding:10px 12px;border-radius:9px;margin-bottom:8px}
.ev-card.meu{background:#d4eaf8;border-left:3px solid #4a8ab5}
.ev-card.u-JR{background:#fdecea;border-left:3px solid #e74c3c}
.ev-card.u-Pepe{background:#d6eaf8;border-left:3px solid #2980b9}
.ev-card.u-Manolo{background:#fef9e7;border-left:3px solid #f1c40f}
.ev-card-tit{font-weight:700;color:#1a3a5c;font-size:14px}
.ev-card-hora{font-size:12px;color:#888;margin-top:2px}
.ev-card-desc{font-size:12px;color:#666;margin-top:2px}
.ev-card-btns{display:flex;gap:7px;margin-top:8px}
.btn-edit{font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:Arial;border:1.5px solid #ddd;background:#fff;color:#1a3a5c}
.btn-edel{font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:Arial;border:1.5px solid #f5c6c2;background:#fdecea;color:#c0392b}
.btn-nou{width:100%;padding:10px;border:1.5px dashed #ddd;border-radius:8px;background:none;color:#1a3a5c;font-size:13px;font-family:Arial;cursor:pointer;margin-top:4px}
.btn-nou:hover{background:#f5f3ee}
.err-txt{color:#c0392b;font-size:13px;text-align:center;margin-top:8px;min-height:18px}
@media(max-width:550px){
  .cel{min-height:58px;padding:3px}
  .num{font-size:12px;width:20px;height:20px;line-height:20px}
  .fest-nom{display:none}
  .camp-2{grid-template-columns:1fr}
  .hdr{height:130px}
  .hdr-tit{font-size:20px}
}
</style>
</head>
<body>

<div id="pg-login">
  <div class="card">
    <h2>Calendari Amics</h2>
    <label for="inp-u">Usuari</label>
    <select id="inp-u">
      <option value="">-- Selecciona --</option>
      <option value="JR">JR</option>
      <option value="Pepe">Pepe</option>
      <option value="Manolo">Manolo</option>
    </select>
    <label for="inp-p">Contrasenya</label>
    <input type="password" id="inp-p" placeholder="Contrasenya">
    <button type="button" id="btn-login">Entrar</button>
    <div id="login-err"></div>
  </div>
</div>

<div id="pg-app">
  <div class="hdr">
    <img src="cabecera.jpg" alt="" style="object-position:center 30%" onerror="this.style.display='none'">
    <div class="hdr-ov"><div class="hdr-tit">Calendari Amics</div></div>
  </div>
  <div class="topbar">
    <div class="topbar-u">
      <div class="av" id="top-av"></div>
      <span id="top-nom"></span>
      <span><span class="sync-dot" id="sync-dot"></span><span id="sync-txt" style="font-size:12px;color:rgba(255,255,255,.7)">connectant...</span></span>
    </div>
    <div class="topbar-btns">
      <button class="tbtn" type="button" onclick="obrirPass()">Contrasenya</button>
      <button class="tbtn" type="button" onclick="debugEvents()">Debug</button>
      <button class="tbtn" type="button" onclick="sortir()">Sortir</button>
    </div>
  </div>
  <div class="cal-wrap">
    <div class="nav">
      <button class="nav-btn" type="button" onclick="canviMes(-1)">&#8249;</button>
      <div class="nav-tit" id="nav-tit"></div>
      <button class="nav-btn" type="button" onclick="canviMes(1)">&#8250;</button>
    </div>
    <div class="ley">
      <div class="ley-i"><div class="ley-d" style="background:#c0392b"></div>Festiu</div>
      <div class="ley-i"><div class="ley-d" style="background:#d4eaf8;border:1px solid #4a8ab5"></div>El teu event</div>
      <div class="ley-i"><div class="ley-d" style="background:#fdecea;border:1px solid #e74c3c"></div>JR ocupat</div>
      <div class="ley-i"><div class="ley-d" style="background:#d6eaf8;border:1px solid #2980b9"></div>Pepe ocupat</div>
      <div class="ley-i"><div class="ley-d" style="background:#fef9e7;border:1px solid #f1c40f"></div>Manolo ocupat</div>
    </div>
    <div class="cal-box">
      <div class="cal-sem">
        <div class="cal-ds">Dl</div><div class="cal-ds">Dt</div><div class="cal-ds">Dc</div>
        <div class="cal-ds">Dj</div><div class="cal-ds">Dv</div><div class="cal-ds">Ds</div><div class="cal-ds">Dg</div>
      </div>
      <div class="cal-dies" id="cal-dies"></div>
    </div>
  </div>
</div>

<div class="overlay" id="m-dia">
  <div class="modal">
    <button class="modal-x" type="button" onclick="tancar('m-dia')">&#10005;</button>
    <h3 id="m-dia-tit"></h3>
    <div id="m-dia-fest" style="font-size:13px;color:#c0392b;margin-bottom:10px"></div>
    <div id="m-dia-evs"></div>
    <button class="btn-nou" type="button" onclick="nouEvent()">+ Nou event en aquest dia</button>
  </div>
</div>

<div class="overlay" id="m-ev">
  <div class="modal">
    <button class="modal-x" type="button" onclick="tancar('m-ev')">&#10005;</button>
    <h3 id="m-ev-tit">Nou event</h3>
    <div class="camp"><label>Titol</label><input type="text" id="ev-titol" placeholder="Reunio, vacances..."></div>
    <div class="camp"><label>Descripcio (opcional)</label><textarea id="ev-desc" placeholder="Detalls..."></textarea></div>
    <div class="camp-2">
      <div class="camp"><label>Data inici</label><input type="date" id="ev-di"></div>
      <div class="camp"><label>Hora inici</label><input type="time" id="ev-hi" value="09:00"></div>
    </div>
    <div class="camp-2">
      <div class="camp"><label>Data fi</label><input type="date" id="ev-df"></div>
      <div class="camp"><label>Hora fi</label><input type="time" id="ev-hf" value="10:00"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-del" type="button" id="ev-btn-del" style="display:none" onclick="eliminarEv()">Eliminar</button>
      <button class="btn-cancel" type="button" onclick="tancar('m-ev')">Cancel.lar</button>
      <button class="btn-save" type="button" onclick="guardarEv()">Guardar</button>
    </div>
  </div>
</div>

<div class="overlay" id="m-pass">
  <div class="modal" style="max-width:320px">
    <button class="modal-x" type="button" onclick="tancar('m-pass')">&#10005;</button>
    <h3>Canviar contrasenya</h3>
    <div class="camp"><label>Contrasenya actual</label><input type="password" id="p-act"></div>
    <div class="camp"><label>Nova contrasenya</label><input type="password" id="p-nov"></div>
    <div class="camp"><label>Confirmar nova</label><input type="password" id="p-con"></div>
    <div class="err-txt" id="p-err"></div>
    <div class="modal-btns">
      <button class="btn-cancel" type="button" onclick="tancar('m-pass')">Cancel.lar</button>
      <button class="btn-save" type="button" onclick="guardarPass()">Actualitzar</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ===================== FIREBASE =====================
var firebaseConfig = {
  apiKey: "AIzaSyAG0WIWtjdsyxdYF_U3Q7IQCCT0sx6MccA",
  authDomain: "calendari-amics.firebaseapp.com",
  projectId: "calendari-amics",
  storageBucket: "calendari-amics.firebasestorage.app",
  messagingSenderId: "937701274533",
  appId: "1:937701274533:web:460efd4a2c144f035cae4c"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// ===================== DADES =====================
var PASS_DEF = { JR: 'jr1234', Pepe: 'pepe1234', Manolo: 'manolo1234' };

function colorUsuari(u){
  if(u==='JR') return 'u-JR';
  if(u==='Pepe') return 'u-Pepe';
  if(u==='Manolo') return 'u-Manolo';
  return 'u-JR';
}
var FESTIUS = {
  '01-01':"Cap d'Any",'01-06':'Reis Mags','04-23':'Sant Jordi',
  '05-01':'Dia del Treball','06-24':'Sant Joan',
  '07-28':'Festa Major Terrassa','07-29':'Sant Llorenc',
  '08-15':"L'Assumpcio",'09-11':'Diada Nacional de Catalunya',
  '09-24':'La Merce','10-12':'Festa Nacional',
  '11-01':'Tots Sants','12-06':'Constitucio',
  '12-08':'La Immaculada','12-25':'Nadal','12-26':'Sant Esteve'
};
var FEST_VAR = {
  2024:{'03-29':'Divendres Sant','04-01':'Dilluns de Pasqua'},
  2025:{'04-18':'Divendres Sant','04-21':'Dilluns de Pasqua'},
  2026:{'04-03':'Divendres Sant','04-06':'Dilluns de Pasqua'},
  2027:{'03-26':'Divendres Sant','03-29':'Dilluns de Pasqua'}
};
var MESOS=['Gener','Febrer','Marc','Abril','Maig','Juny','Juliol','Agost','Setembre','Octubre','Novembre','Desembre'];
var DIES=['Diumenge','Dilluns','Dimarts','Dimecres','Dijous','Divendres','Dissabte'];

var usuari=null, mes=new Date().getMonth(), any=new Date().getFullYear();
var diaSeleccionat=null, evEditId=null, events={}, unsubscribe=null;

// ===================== PASSWORDS (local) =====================
function llegirPass(u){ try{return localStorage.getItem('pass_'+u)||PASS_DEF[u];}catch(e){return PASS_DEF[u];} }
function guardarPassLoc(u,p){ try{localStorage.setItem('pass_'+u,p);}catch(e){} }

// ===================== SYNC FIREBASE =====================
function iniciarSync(){
  setSyncStatus(false,'connectant...');
  unsubscribe = db.collection('eventos').onSnapshot(function(snap){
    events={};
    snap.forEach(function(d){ events[d.id]=d.data(); });
    setSyncStatus(true,'connectat');
    setTimeout(function(){ renderCal(); }, 100);
  }, function(err){
    setSyncStatus(false,'error connexio');
  });
}

function setSyncStatus(ok, txt){
  document.getElementById('sync-dot').className='sync-dot'+(ok?' ok':'');
  document.getElementById('sync-txt').textContent=txt;
}

function fsSet(id, ev){
  db.collection('eventos').doc(id).set(ev).catch(function(e){ alert('Error guardant: '+e.message); });
}
function fsDel(id){
  db.collection('eventos').doc(id).delete().catch(function(e){ alert('Error eliminant: '+e.message); });
}

// ===================== LOGIN =====================
document.getElementById('btn-login').addEventListener('click', function(){
  var u=document.getElementById('inp-u').value;
  var p=document.getElementById('inp-p').value;
  var err=document.getElementById('login-err');
  err.textContent='';
  if(!u){err.textContent='Selecciona un usuari.';return;}
  if(!p){err.textContent='Escriu la contrasenya.';return;}
  if(llegirPass(u)!==p){err.textContent='Contrasenya incorrecta.';return;}
  usuari=u;
  document.getElementById('pg-login').style.display='none';
  document.getElementById('pg-app').style.display='block';
  document.getElementById('top-av').textContent=u.substring(0,2).toUpperCase();
  document.getElementById('top-nom').textContent=u;
  mes=new Date().getMonth(); any=new Date().getFullYear();
  iniciarSync();
});

document.getElementById('inp-p').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('btn-login').click();
});

function sortir(){
  if(unsubscribe) unsubscribe();
  usuari=null; events={};
  document.getElementById('pg-login').style.display='flex';
  document.getElementById('pg-app').style.display='none';
  document.getElementById('inp-p').value='';
  document.getElementById('login-err').textContent='';
}

// ===================== CALENDARI =====================
function p2(n){return String(n).padStart(2,'0');}
function esFestiu(y,m,d){var c=p2(m+1)+'-'+p2(d);return FESTIUS[c]||(FEST_VAR[y]||{})[c]||null;}

function eventsDelDia(dateStr){
  var res=[];
  for(var id in events){
    var ev=events[id];
    if(!ev||!ev.di||!ev.df) continue;
    var di=ev.di, df=ev.df;
    if(dateStr>=di && dateStr<=df) res.push(Object.assign({},ev,{id:id}));
  }
  return res;
}

function canviMes(d){
  mes+=d;
  if(mes<0){mes=11;any--;} if(mes>11){mes=0;any++;}
  renderCal();
}

function renderCal(){
  document.getElementById('nav-tit').textContent=MESOS[mes]+' '+any;
  var cont=document.getElementById('cal-dies');
  cont.innerHTML='';
  var p1=new Date(any,mes,1),ds=p1.getDay();
  ds=ds===0?6:ds-1;
  var dm=new Date(any,mes+1,0).getDate(),dma=new Date(any,mes,0).getDate();
  var hoy=new Date();
  for(var i=0;i<ds;i++){
    var c=document.createElement('div');c.className='cel altre';
    c.innerHTML='<div class="num">'+(dma-ds+1+i)+'</div>';cont.appendChild(c);
  }
  for(var d=1;d<=dm;d++) cont.appendChild(crearCel(d,any,mes,hoy));
  var tot=cont.children.length,res=tot%7===0?0:7-(tot%7);
  for(var j=1;j<=res;j++){
    var c2=document.createElement('div');c2.className='cel altre';
    c2.innerHTML='<div class="num">'+j+'</div>';cont.appendChild(c2);
  }
}

function crearCel(d,y,m,hoy){
  var div=document.createElement('div');div.className='cel';
  if(d===hoy.getDate()&&m===hoy.getMonth()&&y===hoy.getFullYear()) div.classList.add('avui');
  var fd=new Date(y,m,d);if(fd.getDay()===0) div.classList.add('dg');
  var fst=esFestiu(y,m,d);if(fst) div.classList.add('fest');
  var nd=document.createElement('div');nd.className='num';nd.textContent=d;div.appendChild(nd);
  if(fst){var fl=document.createElement('span');fl.className='fest-nom';fl.textContent=fst;div.appendChild(fl);}
  var dateStr=y+'-'+p2(m+1)+'-'+p2(d),evs=eventsDelDia(dateStr);
  if(evs.length>0){
    var ec=document.createElement('div');ec.className='ev-list';
    evs.slice(0,3).forEach(function(ev){
      var pill=document.createElement('div');
      var meu=ev.usuario===usuari;
      pill.className='ev-pill '+(meu?'meu':colorUsuari(ev.usuario));
      pill.textContent=meu?ev.titol:ev.usuario+' - ocupat';
      ec.appendChild(pill);
    });
    div.appendChild(ec);
  }
  div.addEventListener('click',function(){obrirDia(d,m,y,fst);});
  return div;
}

// ===================== MODAL DIA =====================
function obrirDia(d,m,y,fst){
  diaSeleccionat={d:d,m:m,y:y};
  var f=new Date(y,m,d);
  document.getElementById('m-dia-tit').textContent=DIES[f.getDay()]+', '+d+' de '+MESOS[m]+' de '+y;
  document.getElementById('m-dia-fest').textContent=fst?'Festiu: '+fst:'';
  var dateStr=y+'-'+p2(m+1)+'-'+p2(d),evs=eventsDelDia(dateStr);
  var ct=document.getElementById('m-dia-evs');ct.innerHTML='';
  if(!evs.length){
    ct.innerHTML='<p style="font-size:13px;color:#888;margin-bottom:12px;">Cap event en aquest dia.</p>';
  }else{
    evs.forEach(function(ev){
      var meu=ev.usuario===usuari,card=document.createElement('div');
      card.className='ev-card '+(meu?'meu':colorUsuari(ev.usuario));
      if(meu){
        card.innerHTML='<div class="ev-card-tit">'+ev.titol+'</div>'
          +'<div class="ev-card-hora">'+ev.di+' '+ev.hi+' fins '+ev.df+' '+ev.hf+'</div>'
          +(ev.desc?'<div class="ev-card-desc">'+ev.desc+'</div>':'')
          +'<div class="ev-card-btns">'
          +'<button class="btn-edit" type="button" onclick="editarEv(\''+ev.id+'\')">Editar</button>'
          +'<button class="btn-edel" type="button" onclick="confirmarDel(\''+ev.id+'\')">Eliminar</button>'
          +'</div>';
      }else{
        card.innerHTML='<div class="ev-card-tit">'+ev.usuario+' - Ocupat</div>'
          +'<div class="ev-card-hora">'+ev.di+' '+ev.hi+' fins '+ev.df+' '+ev.hf+'</div>';
      }
      ct.appendChild(card);
    });
  }
  obrir('m-dia');
}

// ===================== MODAL EVENT =====================
function nouEvent(){
  tancar('m-dia');evEditId=null;
  document.getElementById('m-ev-tit').textContent='Nou event';
  document.getElementById('ev-btn-del').style.display='none';
  var f=diaSeleccionat.y+'-'+p2(diaSeleccionat.m+1)+'-'+p2(diaSeleccionat.d);
  document.getElementById('ev-titol').value='';
  document.getElementById('ev-desc').value='';
  document.getElementById('ev-di').value=f;
  document.getElementById('ev-hi').value='09:00';
  document.getElementById('ev-df').value=f;
  document.getElementById('ev-hf').value='10:00';
  obrir('m-ev');
  setTimeout(function(){document.getElementById('ev-titol').focus();},100);
}

function editarEv(id){
  tancar('m-dia');var ev=events[id];
  if(!ev||ev.usuario!==usuari) return;
  evEditId=id;
  document.getElementById('m-ev-tit').textContent='Editar event';
  document.getElementById('ev-btn-del').style.display='block';
  document.getElementById('ev-titol').value=ev.titol;
  document.getElementById('ev-desc').value=ev.desc||'';
  document.getElementById('ev-di').value=ev.di;
  document.getElementById('ev-hi').value=ev.hi;
  document.getElementById('ev-df').value=ev.df;
  document.getElementById('ev-hf').value=ev.hf;
  obrir('m-ev');
}

function guardarEv(){
  var t=document.getElementById('ev-titol').value.trim();
  if(!t){alert('El titol es obligatori.');return;}
  var di=document.getElementById('ev-di').value,hi=document.getElementById('ev-hi').value;
  var df=document.getElementById('ev-df').value,hf=document.getElementById('ev-hf').value;
  if(!di||!df){alert('Les dates son obligatories.');return;}
  if(df<di||(df===di&&hf<hi)){alert('La data fi ha de ser posterior.');return;}
  var id=evEditId||('ev_'+Date.now()+'_'+Math.random().toString(36).substr(2,5));
  tancar('m-ev');
  fsSet(id,{usuario:usuari,titol:t,desc:document.getElementById('ev-desc').value.trim(),di:di,hi:hi,df:df,hf:hf});
}

function confirmarDel(id){
  if(!confirm('Segur que vols eliminar aquest event?')) return;
  tancar('m-dia');fsDel(id);
}
function eliminarEv(){
  if(!evEditId||!confirm('Segur?')) return;
  tancar('m-ev');fsDel(evEditId);
}

// ===================== CONTRASENYA =====================
function obrirPass(){
  document.getElementById('p-act').value='';
  document.getElementById('p-nov').value='';
  document.getElementById('p-con').value='';
  document.getElementById('p-err').textContent='';
  obrir('m-pass');
}
function guardarPass(){
  var a=document.getElementById('p-act').value,n=document.getElementById('p-nov').value,c=document.getElementById('p-con').value;
  var err=document.getElementById('p-err');err.textContent='';
  if(llegirPass(usuari)!==a){err.textContent='Contrasenya actual incorrecta.';return;}
  if(n.length<4){err.textContent='Minim 4 caracters.';return;}
  if(n!==c){err.textContent='Les contrasenyes no coincideixen.';return;}
  guardarPassLoc(usuari,n);tancar('m-pass');alert('Contrasenya actualitzada!');
}

// ===================== DEBUG =====================
function debugEvents(){
  var msg = 'Usuari: '+usuari+'\n';
  msg += 'Events a memoria: '+Object.keys(events).length+'\n\n';
  for(var id in events){
    var ev=events[id];
    msg += ev.usuario+': '+ev.titol+' ('+ev.di+' fins '+ev.df+')\n';
  }
  alert(msg);
}

// ===================== UTILS =====================
function obrir(id){document.getElementById(id).classList.add('vis');}
function tancar(id){document.getElementById(id).classList.remove('vis');}
document.querySelectorAll('.overlay').forEach(function(o){
  o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('vis');});
});
</script>
